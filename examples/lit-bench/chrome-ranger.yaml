command: bash bench.sh
# bench.sh isn't in the Lit repo, so setup copies it from project root into each worktree.
# Worktrees live at .chrome-ranger/worktrees/<ref>/, 3 levels below project root.
setup: cp ../../../bench.sh . && npm ci && npm run build
iterations: 5
warmup: 1
workers: 1          # benchmarks are timing-sensitive; parallelism skews results

chrome:
  versions:
    - "130.0.6723.58"
    - "134.0.6998.35"

code:
  repo: .
  refs:
    - "lit@3.0.0"
    - "lit@3.2.0"
